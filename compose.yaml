# Smart Blood Donation System - Docker Compose
#
# Brings up the Spring Boot backend (which also serves the built React SPA)
# and the WhatsApp microservice on the same network. Oracle XE is assumed
# to run on the host (or another machine reachable from the container).
#
# Required env vars (export before `docker compose up`):
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET, CORS_ALLOWED_ORIGINS,
#   WHATSAPP_INTERNAL_TOKEN
#
# See backend-spring/src/main/resources/application.properties for the full
# list of supported overrides.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lifeflow/backend:latest
    container_name: lifeflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SQL_INIT_MODE=never
      # Where the backend reaches the WhatsApp microservice on this network.
      - WHATSAPP_SERVICE_URL=http://whatsapp:3001
      - WHATSAPP_INTERNAL_TOKEN=${WHATSAPP_INTERNAL_TOKEN}
    depends_on:
      whatsapp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/public/stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - lifeflow-net

  whatsapp:
    build:
      context: ./whatsapp-service
    image: lifeflow/whatsapp:latest
    container_name: lifeflow-whatsapp
    restart: unless-stopped
    environment:
      - WHATSAPP_INTERNAL_TOKEN=${WHATSAPP_INTERNAL_TOKEN}
      # Bind to all interfaces inside the container; only the `app` service
      # on the same docker network can reach it.
      - WHATSAPP_BIND_ADDRESS=0.0.0.0
    volumes:
      - whatsapp-session:/usr/src/app/.wwebjs_auth
      - whatsapp-cache:/usr/src/app/.wwebjs_cache
    networks:
      - lifeflow-net

networks:
  lifeflow-net:
    driver: bridge

volumes:
  whatsapp-session:
  whatsapp-cache:
