spring.application.name=blooddonation

# Database Configuration (Oracle)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
spring.datasource.password=nour12345
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.auto-commit=true

# MySQL Configuration (Commented out)
# spring.datasource.url=jdbc:mysql://localhost:3306/blood_donation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
