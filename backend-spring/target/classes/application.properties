# JPA Configuration
# We will use schema.sql and data.sql to initialize everything.
# JPA Configuration
# We will use 'update' to preserve data between restarts.
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true
# Standard locations (schema.sql and data.sql) will be picked up automatically
spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# JWT Secret
custom.jwt.secret=BloodDonationSystemSecretKeyWhichMustBeVeryLongAndSecureForHMACSHA512AlgorithmsToWorkCorrectly12345
custom.jwt.expirationMs=86400000

# Server Port & Address
server.port=8080
server.address=0.0.0.0
