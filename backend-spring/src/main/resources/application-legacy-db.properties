# =============================================================================
# LEGACY DATABASE PROFILE — use your existing Oracle data (19+ users in SQL Developer)
# =============================================================================
# Activate with ONE of:
#   spring.profiles.active=legacy
#   (or add to application-local.properties: spring.profiles.active=legacy)
#
# This uses the classic XE SID URL. Many SQL Developer connections named "test"
# point here instead of XEPDB1. Spring Boot must use the SAME URL as SQL Developer.
# =============================================================================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:nour12345}

# Never overwrite existing users/passwords when using your real database
app.seed-demo.enabled=false
app.seed-demo.sync-passwords=false
app.seed-demo.sync-all-passwords=false
