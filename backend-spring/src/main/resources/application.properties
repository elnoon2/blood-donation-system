spring.application.name=blooddonation

# Auto-load application-local.properties when present (gitignored).
# Operators copy application-local.properties.example -> application-local.properties
# and fill in their local Oracle credentials there. See audit/08-rca-ora-01017.md.
spring.config.import=optional:classpath:application-local.properties

# ============================================================
# Database Configuration (Oracle)
# Credentials MUST be supplied via environment variables in any non-local
# environment. The fallback values below exist ONLY so a local developer can
# boot against a local Oracle XE. Do NOT use these values in staging or prod.
# ============================================================
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521:xe}
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME_LOCAL_DEV_ONLY}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.auto-commit=true

# ============================================================
# JPA / Hibernate
#
# `ddl-auto=update` is the safe default while we are on Spring Boot 3.2.5
# (which ships Flyway 9.22.3 Community Edition -- Oracle support is gated
# behind Teams Edition in 9.x and only becomes free in Flyway 10.x). When
# the project upgrades to Spring Boot 3.3+ (Flyway 10) AND we add
# `flyway-database-oracle`, switch this back to `none` so Flyway is the
# sole authority. Until then, Hibernate creates/updates schema from the
# entity model on boot.
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Legacy spring.sql.init.* removed -- managed schema is now entirely owned by
# Hibernate ddl-auto (with the V1-V4 migration files in db/migration/ kept as
# the intended-schema reference; apply via sqlplus when Flyway is upgraded).

# ============================================================
# Flyway -- authoritative source of schema state.
# V1__baseline_schema.sql  = full current schema (for fresh installs)
# V2__add_indexes.sql      = 22 FK / hot-query indexes
# V3__schema_hardening.sql = CHECK constraints + version cols + missing FKs
#
# `baseline-on-migrate=true` lets Flyway adopt a pre-existing DB without
# trying to re-run V1 on it -- it marks V1 as already applied and runs V2+.
# Disabled by default: Spring Boot 3.2.5 ships Flyway 9.22.3 Community Edition,
# which rejects Oracle 21.x ("Unsupported Database: Oracle 21.0"). Hibernate
# ddl-auto=update owns schema until Flyway 10+ (with flyway-database-oracle) is
# adopted. Opt in later with FLYWAY_ENABLED=true after upgrading Flyway.
# ============================================================
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ============================================================
# Logging - verbose SQL is dev only. Override via application-dev.properties
# or LOG_SQL_LEVEL env var.
# ============================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.springframework.jdbc.datasource.init=INFO
logging.level.org.hibernate.SQL=${LOG_SQL_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ============================================================
# JWT
# Secret MUST be supplied via JWT_SECRET env var in any environment that
# accepts non-local traffic. The fallback below is intentionally a recognizable
# placeholder so we fail visibly if it's ever shipped.
# ============================================================
custom.jwt.secret=${JWT_SECRET:CHANGE_ME_LOCAL_DEV_ONLY_AT_LEAST_64_BYTES_LONG_PLACEHOLDER_VALUE}
custom.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# CORS - comma-separated origin allowlist.
# Entries WITHOUT '*' become exact origins; entries WITH '*' become
# allowedOriginPatterns (needed for mobile-on-LAN QR scanning where the dev
# server is reached at http://192.168.x.y:5173). Do NOT ship wildcards to
# production -- override CORS_ALLOWED_ORIGINS with explicit prod origins.
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.*:5173,http://10.*:5173}

# ============================================================
# WhatsApp microservice (Phase 13)
#   app.whatsapp.enabled  → kill switch; set to false to disable sends entirely
#   app.whatsapp.url      → base URL of the Node microservice
#   app.whatsapp.token    → shared secret. The Node service requires this as
#                           X-Internal-Token unless WHATSAPP_ALLOW_INSECURE=true
#                           on its side (dev convenience only).
# Failures NEVER roll back donation transactions; every attempt is persisted
# to the `whatsapp_delivery_log` table for audit (see audit/13-whatsapp-and-autofill.md).
# ============================================================
app.whatsapp.enabled=${WHATSAPP_ENABLED:true}
app.whatsapp.url=${WHATSAPP_SERVICE_URL:http://127.0.0.1:3001}
app.whatsapp.token=${WHATSAPP_INTERNAL_TOKEN:}

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.error.include-message=never
server.error.include-stacktrace=never
