spring.application.name=blooddonation

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/blood_donation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
# We will use schema.sql and data.sql to initialize everything.
# Set ddl-auto to none to allow schema.sql to manage the structure.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Secret
custom.jwt.secret=BloodDonationSystemSecretKeyWhichMustBeVeryLongAndSecureForHMACSHA512AlgorithmsToWorkCorrectly12345
custom.jwt.expirationMs=86400000

# Server Port & Address
server.port=8080
server.address=0.0.0.0

# Load SQL scripts
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.schema-locations=classpath:schema.sql
