# ============================================================
# Production profile — Postgres on Neon, deployed to Railway.
# Activated by SPRING_PROFILES_ACTIVE=prod on Railway.
# Local Oracle profile is unaffected (no profile = Oracle).
# ============================================================

# Datasource — Neon Postgres. All values MUST come from env vars.
# Example DB_URL: jdbc:postgresql://ep-cool-fire-123.us-east-2.aws.neon.tech/blooddb?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate — Postgres dialect; Flyway owns schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway — Postgres migrations live in a separate folder so the Oracle
# profile (default) is not affected. V1__postgres_baseline.sql creates
# the schema; V2 adds indexes; V3 adds the phone unique constraint.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgres
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# Logging
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

# CORS — MUST be set explicitly in prod. No wildcards. Comma-separated.
# Example: https://blood-donation-system-orpin.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT secret MUST be set in env. App will refuse to issue tokens with
# the placeholder value.
custom.jwt.secret=${JWT_SECRET}
custom.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# WhatsApp — disabled by default in prod unless Node sidecar is also deployed.
app.whatsapp.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.url=${WHATSAPP_SERVICE_URL:http://127.0.0.1:3001}
app.whatsapp.token=${WHATSAPP_INTERNAL_TOKEN:}

# Server — Railway injects PORT; bind to all interfaces inside the container.
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework

# Hide error envelope details in prod.
server.error.include-binding-errors=never
server.error.include-exception=false
